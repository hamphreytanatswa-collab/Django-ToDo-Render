{% extends 'todos/base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="glass-card text-center border-danger" style="max-width: 450px;">
        <div class="mb-3">
            <i class="bi bi-exclamation-octagon text-danger display-4"></i>
        </div>
        <span class="card-label text-danger">Warning: Data Purge</span>
        <h3 class="mb-4">Confirm Deletion?</h3>
        <p class="text-dim mb-5">You are about to permanently remove <strong>"{{ todo.title }}"</strong> from the database.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-danger py-3 rounded-4 fw-bold">Execute Delete</button>
                <a href="{% url 'todo_list' %}" class="btn btn-outline-secondary py-3 rounded-4">Abort</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
