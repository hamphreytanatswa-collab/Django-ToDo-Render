{% extends 'todos/base.html' %}

{% block content %}
<style>
  /* Forces all text inside the login form to be white */
  .login-card-custom, .login-card-custom p, .login-card-custom label {
    color: #ffffff !important;
  }

  /* Ensures the input text typed by the user is also white */
  .login-card-custom input {
    color: #ffffff !important;
    background: #222 !important;
    border: 1px solid var(--border-color) !important;
  }

  /* Style for Django's validation error text */
  .errorlist {
    color: #ff4d4d;
    list-style: none;
    padding: 0;
    font-size: 0.85rem;
  }
</style>

<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="glass-card login-card-custom" style="width: 100%; max-width: 400px;">
    
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock" style="font-size: 3rem; color: var(--accent-gold);"></i>
      <h1 class="h3 fw-bold mt-2">Lavender Login</h1>
      <p class="text-dim">Authorized Personnel Only</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        {{ form.as_p }}
      </div>
      <button class="btn-gold w-100" type="submit">
        <i class="bi bi-door-open me-2"></i> Access System
      </button>
    </form>
    
  </div>
</div>
{% endblock %}
